font_family Maple Mono NF

# this is modified from diinki's retrofuture kitty theme
shell_integration no-cursor
cursor_shape beam

window_padding_width 7
window_padding_height 7

scrollback_lines 3000

# font size
font_size 11
map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0

# meow
background_opacity 1

cursor               #fc92fc

selection_background #d8cab8
selection_foreground #18041b

background           #18041b
foreground           #d8cab8

color0               #2b2135
color8               #92fcfa

color1               #fc4649
color9               #fc4649

color2               #fc92fc
color10              #fc92fc

color3               #AC82E9
color11              #AC82E9

color4               #fc92fc
color12              #fc92fc

color5               #fc92fc
color13              #fc92fc

color6               #fc92fc
color14              #fc92fc

color7               #fc92fc
color15              #d8cab8